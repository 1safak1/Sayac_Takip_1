<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tesis Endeks Takip Sistemi - Aylık elektrik ve su tüketim takibi">
  <title>Tesis Endeks Takip Sistemi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="theme-red">
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20V10"/>
              <path d="M18 20V4"/>
              <path d="M6 20v-4"/>
            </svg>
          </div>
          <h1>Endeks Takip</h1>
        </div>
        <p class="header-subtitle">Tesis Tüketim Yönetim Sistemi</p>
      </div>
    </header>

    <!-- Main Navigation -->
    <nav class="main-nav menu-grid">
      <button class="nav-btn active" data-view="elek-manage">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Elektrik Veri Girişi
      </button>
      <button class="nav-btn" data-view="su-manage">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
        Su Veri Girişi
      </button>
      <button class="nav-btn" data-view="tesis-manage">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7H3l2-4h14l2 4"/><path d="M5 21V10.85"/><path d="M19 21V10.85"/><path d="M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/></svg>
        Tesis Veri Girişi
      </button>
      <button class="nav-btn" data-view="elek-summary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Elek. Özet Rapor
      </button>
      <button class="nav-btn" data-view="su-summary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Su Özet Rapor
      </button>
      <button class="nav-btn" data-view="tesis-summary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Tesis Özet Rapor
      </button>
    </nav>

    <!-- Management View -->
    <div id="management-view" class="view-section">
      <main class="main">
        <!-- Add Facility Section -->
        <section class="card add-section" id="add-section">
          <div class="card-header">
            <h2 id="add-title">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21h18"/><path d="M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7H3l2-4h14l2 4"/><path d="M5 21V10.85"/><path d="M19 21V10.85"/><path d="M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/>
              </svg>
              Yeni Tesis Ekle
            </h2>
          </div>
          <form id="add-facility-form" class="add-form">
            <div class="form-group">
              <label for="facility-name" id="lbl-facility-name">Tesis Adı</label>
              <input type="text" id="facility-name" placeholder="Örn: Fabrika A" required autocomplete="off">
            </div>
            <div class="form-group" id="unit-group" style="display:none;">
              <label for="facility-unit">Birim</label>
              <input type="text" id="facility-unit" placeholder="Örn: kg, m, adet">
            </div>
            <div class="form-group">
              <label for="initial-index" id="lbl-initial-index">Başlangıç Endeksi</label>
              <input type="number" id="initial-index" placeholder="Örn: 0" min="0" step="0.01">
            </div>
            <button type="submit" class="btn btn-primary" id="btn-add-facility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Ekle
            </button>
          </form>
        </section>

        <!-- Facilities List -->
        <section class="card facilities-section" id="facilities-section">
          <div class="card-header">
            <h2>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
              Tesisler (<span id="active-tab-name">Elektrik</span>)
            </h2>
            <span class="badge" id="facility-count">0</span>
          </div>

          <!-- Empty State -->
          <div class="empty-state" id="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            <p>Henüz tesis eklenmedi</p>
            <span>Yeni tesis ekleyerek takibe başlayın</span>
          </div>

          <div class="facilities-list" id="facilities-list"></div>
        </section>
      </main>
    </div>

    <!-- Summary View -->
    <div id="summary-view" class="view-section" style="display:none;">
      <section class="card summary-card">
        <div class="card-header summary-header">
          <h2 id="summary-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Tüketim Özeti
          </h2>
          <div class="summary-controls">
            <div class="summary-toggle-group">
              <button class="toggle-btn active" data-type="consumption">Tüketim</button>
              <button class="toggle-btn" data-type="index">Endeks</button>
            </div>
            <select id="summary-year-select" class="form-select"></select>
            <input type="date" id="summary-date-select" class="form-select" style="display:none;">
          </div>
        </div>
        
        <div class="table-responsive">
          <table class="summary-table" id="summary-table">
            <!-- Populated via JS -->
          </table>
        </div>

        <div class="summary-footer">
          <button id="btn-export-pdf" class="btn btn-secondary btn-full">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            PDF Raporu Oluştur (Tüm Veriler)
          </button>
        </div>
      </section>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="index-modal">
        <div class="modal-header">
          <h3 id="modal-title">Endeks Girişi</h3>
          <button class="btn-close" id="btn-close-modal" aria-label="Kapat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-info">
            <div class="info-item">
              <span class="info-label">Önceki Endeks</span>
              <span class="info-value" id="modal-prev-index">—</span>
            </div>
          </div>
          <form id="index-form">
            <div class="form-group">
              <label for="new-index">Yeni Endeks Değeri</label>
              <input type="number" id="new-index" placeholder="Yeni değeri girin" min="0" step="1" required>
            </div>
            <div class="form-group" style="margin-top: 12px; margin-bottom: 16px;">
              <label for="reading-date">Okuma Dönemi (Ay/Yıl)</label>
              <input type="month" id="reading-date" required>
            </div>
            <div class="consumption-preview" id="consumption-preview" style="display:none;">
              <span class="preview-label">Hesaplanan Tüketim</span>
              <span class="preview-value" id="preview-value">0</span>
            </div>
            <div class="form-group" style="margin-top: 12px; margin-bottom: 16px;">
              <label for="reading-note">Not (Opsiyonel - Max 70 Karakter)</label>
              <textarea id="reading-note" maxlength="70" rows="2" placeholder="Kısa bir not ekleyin..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btn-save-index">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>
              Kaydet
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="delete-modal-overlay">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3>Tesisi Sil</h3>
          <button class="btn-close" id="btn-close-delete-modal" aria-label="Kapat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <p class="delete-msg">Bu tesisi ve tüm verilerini silmek istediğinize emin misiniz?</p>
          <p class="delete-name" id="delete-name"></p>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="btn-cancel-delete">İptal</button>
            <button class="btn btn-danger" id="btn-confirm-delete">Sil</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <span id="toast-message"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

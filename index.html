<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Abone Endeks Takip Sistemi - Aylık su/elektrik/doğalgaz tüketim takibi">
  <title>Abone Endeks Takip Sistemi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20V10"/>
              <path d="M18 20V4"/>
              <path d="M6 20v-4"/>
            </svg>
          </div>
          <h1>Endeks Takip</h1>
        </div>
        <p class="header-subtitle">Abone Tüketim Yönetim Sistemi</p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Add Subscriber Section -->
      <section class="card add-section" id="add-section">
        <div class="card-header">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            Yeni Abone Ekle
          </h2>
        </div>
        <form id="add-subscriber-form" class="add-form">
          <div class="form-group">
            <label for="subscriber-name">Abone Adı Soyadı</label>
            <input type="text" id="subscriber-name" placeholder="Örn: Ahmet Yılmaz" required autocomplete="off">
          </div>
          <div class="form-group">
            <label for="initial-index">Başlangıç Endeks Değeri</label>
            <input type="number" id="initial-index" placeholder="Örn: 1250" min="0" step="1" required>
          </div>
          <button type="submit" class="btn btn-primary" id="btn-add-subscriber">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Abone Ekle
          </button>
        </form>
      </section>

      <!-- Subscribers List -->
      <section class="card subscribers-section" id="subscribers-section">
        <div class="card-header">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Aboneler
          </h2>
          <span class="badge" id="subscriber-count">0</span>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          <p>Henüz abone eklenmedi</p>
          <span>Yukarıdaki formu kullanarak ilk abonenizi ekleyin</span>
        </div>

        <!-- Subscriber Cards Container -->
        <div class="subscribers-list" id="subscribers-list"></div>
      </section>
    </main>

    <!-- Index Entry Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="index-modal">
        <div class="modal-header">
          <h3 id="modal-title">Endeks Girişi</h3>
          <button class="btn-close" id="btn-close-modal" aria-label="Kapat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-info">
            <div class="info-item">
              <span class="info-label">Önceki Endeks</span>
              <span class="info-value" id="modal-prev-index">—</span>
            </div>
          </div>
          <form id="index-form">
            <div class="form-group">
              <label for="new-index">Yeni Endeks Değeri</label>
              <input type="number" id="new-index" placeholder="Yeni endeks değerini girin" min="0" step="1" required>
            </div>
            <div class="form-group" style="margin-top: 12px; margin-bottom: 16px;">
              <label for="reading-date">Okuma Tarihi</label>
              <input type="date" id="reading-date" required>
            </div>
            <div class="consumption-preview" id="consumption-preview" style="display:none;">
              <span class="preview-label">Hesaplanan Tüketim</span>
              <span class="preview-value" id="preview-value">0</span>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btn-save-index">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Kaydet
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="delete-modal-overlay">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3>Aboneyi Sil</h3>
          <button class="btn-close" id="btn-close-delete-modal" aria-label="Kapat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <p class="delete-msg">Bu aboneyi ve tüm endeks kayıtlarını silmek istediğinize emin misiniz?</p>
          <p class="delete-name" id="delete-name"></p>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="btn-cancel-delete">İptal</button>
            <button class="btn btn-danger" id="btn-confirm-delete">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              Sil
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <span id="toast-message"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
